# SPA Alembic Configuration — BL-008 Phase 3
#
# Run from the repo root:
#   cd spa_core/database && alembic upgrade head
#
# The actual database URL is resolved at runtime by env.py via
# spa_core.database.db_url.get_db_url(), which reads $SPA_DATABASE_URL
# (defaulting to the local SQLite file).
#
# The sqlalchemy.url below is intentionally a placeholder — it is overridden
# in env.py. We leave it set to a dummy value so `alembic` CLI doesn't
# complain about a missing key when it parses this file.

[alembic]
script_location = alembic
sqlalchemy.url = driver://placeholder/overridden-by-env-py
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
