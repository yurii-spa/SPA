[pytest]
# SPA test configuration
# test_family_fund_api requires fastapi which is not in the stdlib-only runtime env.
# Excluded here; run separately in a venv with fastapi installed.
norecursedirs = .git .venv .venv_test __pycache__ *.egg-info node_modules .claude spa_core/tests/test_family_fund_api

# --- Deterministic test execution (Architect N11) --------------------------
# The shared-state suite (~99k tests over data/) gates go-live evidence, so test
# ordering MUST be reproducible: two consecutive runs produce an IDENTICAL
# collection order + pass/fail set, making any flake reproducible.
#   * -p no:randomly  hard-disables pytest-randomly IF it is ever installed
#                     (transitive dep / future add). When the plugin is absent
#                     this is a harmless no-op and pytest keeps its stable
#                     filesystem/alphabetical collection order.
#   * Pair this with PYTHONHASHSEED=0 (set in the env, see CI workflows) to fix
#                     dict/set iteration order for hash-sensitive tests.
# Do NOT remove without re-proving identical collection order across two runs.
addopts = -p no:randomly

# --- Markers (WS4 de-bloat stratification) ---------------------------------
# Registered here so --strict-markers / -W error stay clean.
markers =
    slow: heavier/structural sweep test (e.g. the parametrized analyzer
        structural-contract family). Excluded from the fast lane.
    evidence: go-live EVIDENCE test — gates go-live; MUST run serially and
        deterministically (never parallelised — the canonical track must be
        reproducible). Keep OUT of any xdist run.
    live_data: test reads/asserts against the committed live data/ (SSOT
        consistency guard); opts out of tmp data-dir isolation and SKIPS when
        the artifact is absent on a clean checkout.

# --- Parallel execution (pytest-xdist) -------------------------------------
# xdist is NOT a hard dependency. When installed, run the FAST, non-evidence
# lane in parallel and keep the go-live EVIDENCE lane serial + deterministic:
#
#   # parallel fast lane (excludes evidence; safe to distribute):
#   python3 -m pytest -p no:randomly -m "not evidence" -n auto
#
#   # serial deterministic evidence lane (gates go-live — never parallelise):
#   python3 -m pytest -p no:randomly -m evidence
#
# Without xdist installed the -n flag is simply unavailable; the suite still
# runs serially via the default invocation. PYTHONHASHSEED=0 (set in CI) pins
# hash-order for both lanes.
