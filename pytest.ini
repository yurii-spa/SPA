[pytest]
# SPA test configuration
# test_family_fund_api requires fastapi which is not in the stdlib-only runtime env.
# Excluded here; run separately in a venv with fastapi installed.
norecursedirs = .git .venv .venv_test __pycache__ *.egg-info node_modules spa_core/tests/test_family_fund_api

# --- Deterministic test execution (Architect N11) --------------------------
# The shared-state suite (~99k tests over data/) gates go-live evidence, so test
# ordering MUST be reproducible: two consecutive runs produce an IDENTICAL
# collection order + pass/fail set, making any flake reproducible.
#   * -p no:randomly  hard-disables pytest-randomly IF it is ever installed
#                     (transitive dep / future add). When the plugin is absent
#                     this is a harmless no-op and pytest keeps its stable
#                     filesystem/alphabetical collection order.
#   * Pair this with PYTHONHASHSEED=0 (set in the env, see CI workflows) to fix
#                     dict/set iteration order for hash-sensitive tests.
# Do NOT remove without re-proving identical collection order across two runs.
addopts = -p no:randomly
