name: SPA Lint — LLM forbidden

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-llm-forbidden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check for forbidden LLM SDK imports
        run: python scripts/lint_llm_forbidden.py --strict
