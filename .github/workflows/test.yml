name: SPA Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '**.md'
      - 'AUTOPUSH_REPORT_*'
      - 'scripts/archive/**'
      - 'scripts/push_*.sh'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '**.md'
      - 'AUTOPUSH_REPORT_*'
      - 'scripts/archive/**'
      - 'scripts/push_*.sh'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-pytest
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        run: pip install pytest

      # --- Deterministic test execution (Architect N11) ---------------------
      # Two CI runs MUST produce an IDENTICAL collection order + pass/fail set
      # so any flake in the ~99k shared-state suite is reproducible (this suite
      # gates go-live evidence).
      #   * PYTHONHASHSEED=0   — fixes dict/set iteration order so tests that
      #                          (incorrectly) depend on hash ordering are stable.
      #   * -p no:randomly     — hard-disables pytest-randomly IF it is ever
      #                          installed (transitive dep / future add). With
      #                          the plugin absent it is a harmless no-op, so
      #                          collection stays in stable filesystem order.
      # Do NOT remove these flags without re-proving reproducibility.
      - name: Run integration tests
        run: python -m pytest tests/ -v --tb=short -p no:randomly
        env:
          SPA_ENV: ci
          PYTHONHASHSEED: '0'

      - name: Run spa_core unit tests
        run: |
          python -m pytest spa_core/tests/ -q --tb=short -p no:randomly \
            --ignore=spa_core/tests/test_golive_checker.py
        env:
          SPA_ENV: ci
          PYTHONHASHSEED: '0'

      - name: Pre-deploy checks (dry run)
        run: python3 scripts/pre_deploy_check.py
        env:
          SPA_ENV: ci

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check forbidden imports (risk/execution domains)
        run: |
          python3 -c "
          import ast, os, sys
          forbidden = ['anthropic', 'openai', 'langchain', 'numpy', 'pandas']
          errors = []
          for domain in ['spa_core/risk', 'spa_core/execution']:
              for root, dirs, files in os.walk(domain):
                  for f in files:
                      if f.endswith('.py'):
                          src = open(os.path.join(root, f)).read()
                          for lib in forbidden:
                              if f'import {lib}' in src or f'from {lib}' in src:
                                  errors.append(f'{os.path.join(root, f)}: forbidden import {lib}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Import check PASS')
          "

      - name: Stdlib contract guard
        run: python3 scripts/stdlib_contract_guard.py

      - name: KANBAN health check
        run: python3 scripts/kanban_health.py --check-only
