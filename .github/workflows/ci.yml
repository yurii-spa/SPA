name: SPA CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '**.md'
      - 'AUTOPUSH_REPORT_*'
      - 'scripts/archive/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '**.md'
      - 'AUTOPUSH_REPORT_*'
      - 'scripts/archive/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pyyaml argon2-cffi eth-account fastapi pydantic httpx requests web3 numpy pandas  # option-A full test-dep set (CI runs the whole suite; runtime stays stdlib-only)

      - name: Smoke test — import spa_core
        run: |
          python3 -c "
          from spa_core.base import BaseAnalytics, BaseReport, BaseAdapter
          from spa_core.utils.kanban import increment_done
          import spa_core
          print('spa_core imports OK')
          "
        env:
          SPA_ENV: ci

      # --- Deterministic test execution (Architect N11) ---------------------
      # Reproducible order/seed so flakes in the shared-state suite (which gates
      # go-live evidence) are reproducible across two consecutive CI runs:
      #   PYTHONHASHSEED=0  fixes dict/set iteration order;
      #   -p no:randomly    disables pytest-randomly if ever installed (no-op
      #                     when absent → stable filesystem collection order).
      # Do NOT remove without re-proving identical collection order.
      - name: Run spa_core/tests (unit)
        run: |
          cd spa_core
          python -m pytest tests/ -q --tb=short -p no:randomly --ignore=tests/test_golive_checker.py
        env:
          SPA_ENV: ci
          PYTHONHASHSEED: '0'

      - name: Run tests/ root (integration)
        run: |
          python -m pytest tests/ -q --tb=short -x -p no:randomly --ignore=tests/test_golive_checker.py
        env:
          SPA_ENV: ci
          PYTHONHASHSEED: '0'

      # --- Pre-cutover readiness gate (ADVISORY, non-blocking) ----------------
      # Drives a cycle through EACH money-path failure mode against an ephemeral
      # SANDBOX and asserts every defense fires (HARD/SOFT kill, DL-01/DL-02,
      # RiskPolicy, analytics, Base-gas, NAV-reconcile, position-monitor,
      # fail-safe HOLD, inert live-gate). INERT / sandbox-only / never imports
      # execution/. `continue-on-error: true` → ADVISORY: it never gates the
      # push and never flips is_live; the LiveTradingGate stays the master block.
      # Doc: docs/PRE_CUTOVER_GATE.md.
      - name: Pre-cutover readiness gate (advisory)
        continue-on-error: true
        run: python3 scripts/pre_cutover_gate.py
        env:
          SPA_ENV: ci
          PYTHONHASHSEED: '0'

      - name: Presentation-vs-SSOT guard (Law 3)
        run: python3 scripts/check_presentation_ssot.py
        env:
          SPA_ENV: ci

      - name: Strategy-as-config change-control guard
        run: python3 scripts/check_strategy_configs.py
        env:
          SPA_ENV: ci

      - name: Site redirect-shadowing guard (no _redirects rule may shadow a real page)
        run: python3 scripts/check_redirect_shadowing.py

      - name: Tier-1 module smoke
        run: |
          python3 -c "import spa_core.backtesting.tier1.evaluator, spa_core.backtesting.tier1.gate, spa_core.backtesting.tier1.nav_proof, spa_core.governance.policy, spa_core.governance.ssot, spa_core.execution.readiness_audit, spa_core.audit.hash_chain"
        env:
          SPA_ENV: ci

      - name: LLM-forbidden guard (risk/execution/monitoring/allocator/adapters)
        run: python3 scripts/lint_llm_forbidden.py
        env:
          SPA_ENV: ci

      - name: Check for forbidden imports
        run: |
          # CI lint: запрещённые импорты в spa_core/risk, spa_core/execution
          python3 -c "
          import ast, os, sys
          forbidden = ['anthropic', 'openai', 'langchain', 'numpy', 'pandas']
          errors = []
          for domain in ['spa_core/risk', 'spa_core/execution']:
            for root, dirs, files in os.walk(domain):
              for f in files:
                  if f.endswith('.py'):
                      src = open(os.path.join(root, f)).read()
                      for lib in forbidden:
                          if f'import {lib}' in src or f'from {lib}' in src:
                              errors.append(f'{os.path.join(root, f)}: forbidden import {lib}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('Import check PASS')
          "

      - name: KANBAN Health Check
        run: python3 scripts/kanban_health.py --check-only

      - name: SPAError Adoption Check
        run: python3 scripts/spaerror_final_audit.py 2>/dev/null || true

      - name: Stdlib Contract Guard
        run: python3 scripts/stdlib_contract_guard.py
