name: Deploy Landing to GitHub Pages (MIRROR — not canonical)

# CANONICAL PRODUCTION = Cloudflare Pages (project "earn-defi", wrangler.toml
# pages_build_output_dir=landing/dist), git-integrated: it builds landing/ on every push to main and
# serves earn-defi.com. This GitHub-Pages workflow is a NON-CANONICAL MIRROR only. It was auto-running on
# every landing/** push AND failing at the "Deploy to GitHub Pages" step (Pages env), producing false
# CI-red while never affecting the live CF site. Trigger reduced to manual (workflow_dispatch) so it no
# longer red-flags the push path. See docs/adr/ADR-YL-011 "Deploy path" for the canonical pipeline.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: cd landing && npm ci

      - name: Build
        run: cd landing && npm run build
        env:
          # Inject public env vars at build time (non-secret)
          PUBLIC_SITE_URL: https://earn-defi.com
          PUBLIC_SHOW_RESEARCH_TAB: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
