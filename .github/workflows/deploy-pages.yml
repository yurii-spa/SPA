name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/**'
  workflow_run:
    workflows: ["SPA — Run & Export"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy smoke
        if: success()
        run: |
          sleep 15
          # Smoke: main page returns 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://yurii-spa.github.io/SPA/" --max-time 15)
          if [ "$STATUS" != "200" ]; then
            echo "SMOKE FAIL: /SPA/ returned $STATUS"
            exit 1
          fi
          echo "SMOKE PASS: /SPA/ returned 200"
          # Smoke: equity data accessible
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "https://yurii-spa.github.io/SPA/data/paper_trading_status.json" --max-time 10)
          if [ "$STATUS2" != "200" ]; then
            echo "SMOKE WARN: data/paper_trading_status.json returned $STATUS2 (non-fatal)"
          else
            echo "SMOKE PASS: data file accessible"
          fi
