name: SPA Email Alerts

# SPA-V390 Email Alert System — runs the deterministic alert rules every 6h
# and emails CRITICAL/WARNING alerts via SMTP (GitHub Secrets).

on:
  schedule:
    # Every 6 hours, on the hour.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run alert checks
        id: run_alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python3 -m spa_core.alerts.run_alerts --verbose | tee alerts_output.txt

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## SPA Email Alerts run"
            echo ""
            if [ -f alerts_output.txt ]; then
              echo '```'
              tail -n 20 alerts_output.txt
              echo '```'
            else
              echo "No output captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report failure to summary
        if: failure()
        run: |
          {
            echo "## ⚠️ SPA Email Alerts FAILED"
            echo ""
            echo "The alert run step failed. Check the job logs above."
          } >> "$GITHUB_STEP_SUMMARY"
