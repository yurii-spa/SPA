[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
explicit_package_bases = True
namespace_packages = True
follow_imports = silent
mypy_path = .
exclude = (?x)(^tests/ | ^scripts/ | ^data/ | ^docs/)

# Strict for critical modules
[mypy-spa_core.utils.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

[mypy-spa_core.safety.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
strict_optional = True
check_untyped_defs = True

# Risk and allocator — no LLM, strict typing required
[mypy-spa_core.risk.*]
disallow_untyped_defs = True
strict_optional = True

[mypy-spa_core.allocator.*]
disallow_untyped_defs = True

# Adapters — typed but more lenient (external API shapes vary)
[mypy-spa_core.adapters.*]
warn_return_any = False
ignore_missing_imports = True

# Paper trading core
[mypy-spa_core.paper_trading.*]
check_untyped_defs = True

# Database / alembic — skip (external framework)
[mypy-spa_core.database.alembic.*]
ignore_errors = True
